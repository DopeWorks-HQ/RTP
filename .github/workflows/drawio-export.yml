name: Export draw.io diagrams

on:
  push:
    paths:
      - 'docs/**/*.drawio'
      - '.github/workflows/drawio-export.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export-drawio:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Export draw.io files to SVG
        uses: rlespinasse/drawio-export-action@v2
        with:
          path: docs
          format: svg
          transparent: false

      - name: Commit exported SVGs if changed
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/*.svg docs/**/*.svg
            git commit -m "Auto-export draw.io diagrams"
            git push
          else
            echo "No diagram export changes to commit"
          fi
