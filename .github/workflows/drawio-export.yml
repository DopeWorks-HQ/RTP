name: Export draw.io diagrams

on:
  push:
    paths:
      - "docs/**/*.drawio"
      - ".github/workflows/drawio-export.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export-drawio:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Export draw.io files to SVG
        uses: rlespinasse/drawio-export-action@v2
        with:
          path: docs
          format: svg
          output: export
          remove-page-suffix: true
          transparent: false

      - name: Show exported files
        run: find docs -type f \( -name "*.svg" -o -name "*.drawio" \) | sort

      - name: Commit exported SVGs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          find docs -type f -name "*.svg" -print0 | xargs -0 git add

          if git diff --cached --quiet; then
            echo "No diagram changes"
          else
            git commit -m "Auto-export draw.io diagrams"
            git push
          fi
